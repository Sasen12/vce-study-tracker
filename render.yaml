services:
  - type: web
    name: vce-study-tracker-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run prisma:generate && npm run build && npm run prisma:push
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vce-study-tracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gpt-4o-mini-transcribe
      - key: CONTACT_RECIPIENT_EMAIL
        value: techsavvy356@gmail.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CONTACT_FROM_EMAIL
        sync: false

databases:
  - name: vce-study-tracker-db
    databaseName: vce_study_tracker
    user: vce_study_tracker
